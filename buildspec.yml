version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  build:
    commands:
      - echo "Building..."
      - mvn clean package -DskipTests
  post_build:
    commands:
      - echo "Build complete"

artifacts:
  files:
    - target/app-1.0.0.war
    - appspec.yml
    - scripts/**
  discard-paths: no